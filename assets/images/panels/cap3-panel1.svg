<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Lumi vuela con las lucecitas">
  <defs>
    <linearGradient id="bg3-1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8AC6F0"/>
      <stop offset="60%" stop-color="#F58AB5"/>
      <stop offset="100%" stop-color="#FFD66B"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg3-1)"/>
  <!-- Nubes suaves -->
  <g fill="#FFF7E6" opacity="0.8">
    <ellipse cx="200" cy="200" rx="90" ry="35"/>
    <ellipse cx="950" cy="150" rx="110" ry="40"/>
    <ellipse cx="700" cy="700" rx="120" ry="40"/>
  </g>
  <!-- Lumi volando -->
  <g transform="translate(450 400) rotate(-10)">
    <circle cx="0" cy="0" r="75" fill="#FFD66B" stroke="#FFF7E6" stroke-width="5"/>
    <circle cx="-18" cy="-8" r="7" fill="#3B2E5A"/>
    <circle cx="18" cy="-8" r="7" fill="#3B2E5A"/>
    <path d="M-22 15 q22 22 44 0" stroke="#3B2E5A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="-40" cy="10" r="8" fill="#F58AB5" opacity="0.6"/>
    <circle cx="40" cy="10" r="8" fill="#F58AB5" opacity="0.6"/>
    <!-- alas pequeñas -->
    <ellipse cx="-90" cy="-10" rx="30" ry="15" fill="#FFF7E6" opacity="0.85"/>
    <ellipse cx="90" cy="-10" rx="30" ry="15" fill="#FFF7E6" opacity="0.85"/>
    <!-- estrellita -->
    <polygon points="70,40 100,30 95,50 115,60 90,65 95,85 75,65" fill="#FFD66B" stroke="#FFF7E6" stroke-width="2"/>
  </g>
  <!-- Lucecitas siguiendo -->
  <g>
    <circle cx="650" cy="500" r="18" fill="#FFD66B"/>
    <circle cx="650" cy="500" r="30" fill="#FFD66B" opacity="0.3"/>
    <circle cx="780" cy="450" r="14" fill="#FFD66B"/>
    <circle cx="780" cy="450" r="24" fill="#FFD66B" opacity="0.3"/>
    <circle cx="900" cy="520" r="16" fill="#FFD66B"/>
    <circle cx="900" cy="520" r="26" fill="#FFD66B" opacity="0.3"/>
    <circle cx="1020" cy="470" r="12" fill="#FFD66B"/>
    <circle cx="1020" cy="470" r="22" fill="#FFD66B" opacity="0.3"/>
  </g>
  <text x="40" y="60" font-family="Comic Sans MS, Fredoka, sans-serif" font-size="28" fill="#3B2E5A" opacity="0.7">Cap 3 · Panel 1 — ¡A volar con las lucecitas!</text>
</svg>
