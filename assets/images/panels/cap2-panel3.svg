<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="El búho se presenta a Lumi">
  <defs>
    <linearGradient id="bg2-3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF7E6"/>
      <stop offset="100%" stop-color="#7ED9A6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg2-3)"/>
  <!-- Suelo -->
  <ellipse cx="600" cy="780" rx="700" ry="60" fill="#5FBF88"/>
  <!-- Búho a la derecha -->
  <g transform="translate(800 500)">
    <ellipse cx="0" cy="20" rx="100" ry="120" fill="#C8A878"/>
    <ellipse cx="0" cy="40" rx="65" ry="80" fill="#FFF7E6"/>
    <ellipse cx="0" cy="-60" rx="85" ry="70" fill="#C8A878"/>
    <polygon points="-60,-100 -40,-130 -25,-90" fill="#C8A878"/>
    <polygon points="60,-100 40,-130 25,-90" fill="#C8A878"/>
    <circle cx="-25" cy="-55" r="25" fill="#FFF7E6" stroke="#3B2E5A" stroke-width="4"/>
    <circle cx="25" cy="-55" r="25" fill="#FFF7E6" stroke="#3B2E5A" stroke-width="4"/>
    <line x1="-2" y1="-55" x2="2" y2="-55" stroke="#3B2E5A" stroke-width="4"/>
    <circle cx="-25" cy="-55" r="8" fill="#3B2E5A"/>
    <circle cx="25" cy="-55" r="8" fill="#3B2E5A"/>
