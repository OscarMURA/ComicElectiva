    <circle cx="-15" cy="-5" r="7" fill="#3B2E5A"/>
    <circle cx="15" cy="-5" r="7" fill="#3B2E5A"/>
    <path d="M-18 15 q18 18 36 0" stroke="#3B2E5A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="-30" cy="10" r="6" fill="#F58AB5" opacity="0.6"/>
    <circle cx="30" cy="10" r="6" fill="#F58AB5" opacity="0.6"/>
    <polygon points="60,0 95,-15 88,5 110,15 85,18 88,40 70,20" fill="#FFD66B" stroke="#F58AB5" stroke-width="2"/>
  </g>
  <text x="40" y="60" font-family="Comic Sans MS, Fredoka, sans-serif" font-size="28" fill="#3B2E5A" opacity="0.7">Cap 2 · Panel 3 — Mucho gusto, Lumi</text>
