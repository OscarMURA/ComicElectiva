<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Bosque de noche">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A5C"/>
      <stop offset="100%" stop-color="#1A1A40"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg1)"/>
  <!-- Estrellas -->
  <g fill="#FFD66B">
    <circle cx="120" cy="120" r="3"/>
    <circle cx="300" cy="80" r="2"/>
    <circle cx="500" cy="150" r="3"/>
    <circle cx="780" cy="100" r="2"/>
    <circle cx="980" cy="180" r="3"/>
    <circle cx="1100" cy="90" r="2"/>
    <circle cx="200" cy="250" r="2"/>
    <circle cx="900" cy="280" r="2"/>
  </g>
  <!-- Luna -->
  <circle cx="950" cy="200" r="70" fill="#FFF7E6" opacity="0.95"/>
  <circle cx="930" cy="190" r="60" fill="#2A2A5C" opacity="0.15"/>
  <!-- Árboles silueta -->
  <g fill="#1A1A40">
    <polygon points="100,800 100,500 220,500 160,300"/>
    <polygon points="280,800 280,550 380,550 330,380"/>
    <polygon points="820,800 820,520 940,520 880,320"/>
    <polygon points="1020,800 1020,560 1120,560 1070,400"/>
  </g>
  <!-- Suelo -->
  <rect x="0" y="700" width="1200" height="100" fill="#3B2E5A"/>
  <text x="40" y="60" font-family="Comic Sans MS, Fredoka, sans-serif" font-size="28" fill="#FFD66B" opacity="0.85">Cap 1 · Panel 1 — El bosque dormido</text>
</svg>
