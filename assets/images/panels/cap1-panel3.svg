<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Estrella fugaz cayendo del cielo">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A5C"/>
      <stop offset="100%" stop-color="#3B2E5A"/>
    </linearGradient>
    <linearGradient id="tail3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD66B" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFD66B" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg3)"/>
  <!-- Estrellas pequeñas -->
  <g fill="#FFF7E6">
    <circle cx="100" cy="100" r="2"/>
    <circle cx="250" cy="200" r="2"/>
    <circle cx="1100" cy="500" r="2"/>
    <circle cx="900" cy="600" r="2"/>
  </g>
  <!-- Estela -->
  <path d="M150 100 L750 500" stroke="url(#tail3)" stroke-width="14" stroke-linecap="round"/>
  <!-- Estrella grande cayendo -->
  <g transform="translate(750 500)">
    <polygon points="0,-60 18,-18 60,-12 28,18 36,60 0,38 -36,60 -28,18 -60,-12 -18,-18" fill="#FFD66B" stroke="#F58AB5" stroke-width="3"/>
  </g>
  <!-- Árboles silueta -->
  <g fill="#1A1A40">
    <polygon points="80,800 80,560 200,560 140,360"/>
    <polygon points="1000,800 1000,540 1120,540 1060,340"/>
  </g>
  <!-- Plop -->
  <text x="820" y="500" font-family="Comic Sans MS, Fredoka, sans-serif" font-size="58" fill="#F58AB5" font-weight="700">¡Plop!</text>
  <text x="40" y="60" font-family="Comic Sans MS, Fredoka, sans-serif" font-size="28" fill="#FFD66B" opacity="0.85">Cap 1 · Panel 3 — La estrella fugaz</text>
</svg>
