<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="El búho cuenta que las estrellas se durmieron">
  <defs>
    <linearGradient id="bg2-4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B2E5A"/>
      <stop offset="100%" stop-color="#7ED9A6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg2-4)"/>
  <!-- Estrellas apagadas (grises) -->
  <g fill="#FFF7E6" opacity="0.25">
    <polygon points="200,150 210,180 240,180 215,200 225,230 200,212 175,230 185,200 160,180 190,180"/>
    <polygon points="500,100 510,130 540,130 515,150 525,180 500,162 475,180 485,150 460,130 490,130"/>
    <polygon points="850,180 860,210 890,210 865,230 875,260 850,242 825,260 835,230 810,210 840,210"/>
    <polygon points="1050,120 1060,150 1090,150 1065,170 1075,200 1050,182 1025,200 1035,170 1010,150 1040,150"/>
  </g>
  <!-- Búho mirando arriba con suspiro -->
  <g transform="translate(600 550)">
    <ellipse cx="0" cy="20" rx="110" ry="130" fill="#C8A878"/>
    <ellipse cx="0" cy="40" rx="70" ry="90" fill="#FFF7E6"/>
    <ellipse cx="0" cy="-60" rx="95" ry="80" fill="#C8A878"/>
    <polygon points="-70,-110 -45,-140 -30,-100" fill="#C8A878"/>
    <polygon points="70,-110 45,-140 30,-100" fill="#C8A878"/>
    <circle cx="-30" cy="-65" r="28" fill="#FFF7E6" stroke="#3B2E5A" stroke-width="4"/>
    <circle cx="30" cy="-65" r="28" fill="#FFF7E6" stroke="#3B2E5A" stroke-width="4"/>
    <line x1="-2" y1="-65" x2="2" y2="-65" stroke="#3B2E5A" stroke-width="4"/>
    <!-- ojos mirando arriba -->
    <circle cx="-30" cy="-72" r="9" fill="#3B2E5A"/>
    <circle cx="30" cy="-72" r="9" fill="#3B2E5A"/>
    <polygon points="0,-30 -10,-15 10,-15" fill="#F58AB5"/>
    <!-- gota triste -->
    <ellipse cx="-50" cy="-30" rx="6" ry="10" fill="#8AC6F0"/>
  </g>
  <!-- Burbuja "..." -->
  <ellipse cx="900" cy="350" rx="80" ry="40" fill="#FFF7E6"/>
  <text x="870" y="365" font-family="Comic Sans MS, Fredoka, sans-serif" font-size="48" fill="#3B2E5A">...</text>
  <text x="40" y="60" font-family="Comic Sans MS, Fredoka, sans-serif" font-size="28" fill="#FFF7E6" opacity="0.85">Cap 2 · Panel 4 — Las estrellas se durmieron</text>
</svg>
