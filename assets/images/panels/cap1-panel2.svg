<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Casita en el árbol con Lumi durmiendo">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B2E5A"/>
      <stop offset="100%" stop-color="#2A2A5C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg2)"/>
  <!-- Árbol gigante -->
  <rect x="450" y="200" width="300" height="600" rx="40" fill="#5C3A21"/>
  <!-- Copa -->
  <ellipse cx="600" cy="220" rx="320" ry="220" fill="#3D6B47"/>
  <ellipse cx="450" cy="260" rx="160" ry="130" fill="#4F7D58"/>
  <ellipse cx="760" cy="260" rx="160" ry="130" fill="#4F7D58"/>
  <!-- Hueco -->
  <ellipse cx="600" cy="500" rx="120" ry="140" fill="#1A1A2E"/>
  <!-- Lumi durmiendo (círculo amarillo) -->
  <circle cx="600" cy="520" r="55" fill="#FFD66B"/>
  <circle cx="600" cy="520" r="55" fill="#FFD66B" opacity="0.4" transform="scale(1.3) translate(-138 -120)"/>
  <!-- ojos cerrados -->
  <path d="M580 515 q5 -8 10 0" stroke="#3B2E5A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M610 515 q5 -8 10 0" stroke="#3B2E5A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Z de dormir -->
  <text x="680" y="470" font-family="Comic Sans MS, Fredoka, sans-serif" font-size="36" fill="#FFF7E6">z z z</text>
  <!-- Suelo -->
  <rect x="0" y="780" width="1200" height="20" fill="#2A2A5C"/>
  <text x="40" y="60" font-family="Comic Sans MS, Fredoka, sans-serif" font-size="28" fill="#FFD66B" opacity="0.85">Cap 1 · Panel 2 — Lumi en su casita</text>
</svg>
