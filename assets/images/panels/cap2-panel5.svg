<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Lumi valiente promete ayudar al búho">
  <defs>
    <linearGradient id="bg2-5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD66B"/>
      <stop offset="100%" stop-color="#F58AB5"/>
    </linearGradient>
    <radialGradient id="lumiGlow5b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF7E6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFD66B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg2-5)"/>
  <!-- Suelo -->
  <ellipse cx="600" cy="780" rx="700" ry="60" fill="#5FBF88"/>
  <!-- Lumi central, brillando -->
  <circle cx="500" cy="500" r="220" fill="url(#lumiGlow5b)"/>
  <g transform="translate(500 500)">
    <circle cx="0" cy="0" r="90" fill="#FFD66B" stroke="#FFF7E6" stroke-width="6"/>
    <!-- ojos decididos -->
    <path d="M-25 -10 q12 -12 24 0" stroke="#3B2E5A" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M5 -10 q12 -12 24 0" stroke="#3B2E5A" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- sonrisa grande -->
    <path d="M-30 25 q30 30 60 0" stroke="#3B2E5A" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- mejillas -->
    <circle cx="-50" cy="15" r="10" fill="#F58AB5" opacity="0.6"/>
    <circle cx="50" cy="15" r="10" fill="#F58AB5" opacity="0.6"/>
    <!-- colita estrella -->
    <polygon points="85,0 135,-25 125,5 155,20 120,25 130,55 100,30" fill="#FFD66B" stroke="#FFF7E6" stroke-width="3"/>
  </g>
  <!-- Búho sonriendo -->
  <g transform="translate(900 600)">
    <ellipse cx="0" cy="20" rx="75" ry="90" fill="#C8A878"/>
    <ellipse cx="0" cy="35" rx="48" ry="60" fill="#FFF7E6"/>
    <ellipse cx="0" cy="-45" rx="65" ry="55" fill="#C8A878"/>
    <circle cx="-20" cy="-45" r="20" fill="#FFF7E6" stroke="#3B2E5A" stroke-width="3"/>
    <circle cx="20" cy="-45" r="20" fill="#FFF7E6" stroke="#3B2E5A" stroke-width="3"/>
    <!-- ojos felices -->
    <path d="M-30 -45 q10 -10 20 0" stroke="#3B2E5A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M10 -45 q10 -10 20 0" stroke="#3B2E5A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <polygon points="0,-25 -7,-12 7,-12" fill="#F58AB5"/>
  </g>
  <!-- Destellos -->
  <g fill="#FFF7E6">
    <polygon points="200,200 207,217 224,217 210,228 215,245 200,235 185,245 190,228 176,217 193,217"/>
    <polygon points="800,150 807,167 824,167 810,178 815,195 800,185 785,195 790,178 776,167 793,167"/>
    <polygon points="1080,400 1087,417 1104,417 1090,428 1095,445 1080,435 1065,445 1070,428 1056,417 1073,417"/>
  </g>
  <text x="40" y="60" font-family="Comic Sans MS, Fredoka, sans-serif" font-size="28" fill="#FFF7E6" opacity="0.9">Cap 2 · Panel 5 — ¡Yo las voy a despertar!</text>
</svg>
