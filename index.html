<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <!-- Viewport adaptativo: en escritorio se usa el ancho real del
       dispositivo; en móvil/tablet se renderiza con layout de 1280 px y
       el navegador escala para encajar exactamente en la pantalla. -->
  <meta name="viewport" content="width=1280, initial-scale=1, viewport-fit=cover" />
  <script>
    (function () {
      try {
        var TARGET = 1280;
        var dw = Math.min(
          window.screen && window.screen.width ? window.screen.width : TARGET,
          document.documentElement.clientWidth || TARGET
        );
        var meta = document.querySelector('meta[name="viewport"]');
        if (!meta) return;
        if (dw >= TARGET) {
          meta.setAttribute(
            'content',
            'width=device-width, initial-scale=1, viewport-fit=cover'
          );
        } else {
          var scale = (dw / TARGET).toFixed(4);
          meta.setAttribute(
            'content',
            'width=' + TARGET +
              ', initial-scale=' + scale +
              ', minimum-scale=' + scale +
              ', maximum-scale=5, user-scalable=yes, viewport-fit=cover'
          );
        }
      } catch (e) {}
    })();
  </script>
  <meta name="description" content="Los Hilos del Agua y el Plato de las Preguntas: un cuento ilustrado interactivo." />
  <meta name="theme-color" content="#1F4E79" />
  <title>Los Hilos del Agua y el Plato de las Preguntas</title>

  <!-- Detectar mobile vs desktop antes de pintar para evitar flash -->
  <script>
    (function () {
      try {
        var isMobile = window.matchMedia('(max-width: 768px)').matches;
        document.documentElement.classList.add(isMobile ? 'is-mobile' : 'is-desktop');
      } catch (e) {
        document.documentElement.classList.add('is-desktop');
      }
    })();
  </script>

  <!-- Google Fonts: Fredoka (display) + Patrick Hand (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Patrick+Hand&display=swap"
    rel="stylesheet"
  />

  <!-- Estilos en orden: base -> paneles -> responsive -> animaciones -->
  <link rel="stylesheet" href="css/main.css?v=2026-05-21g" />
  <link rel="stylesheet" href="css/panels.css?v=2026-05-21g" />
  <link rel="stylesheet" href="css/responsive.css?v=2026-05-21g" />
  <link rel="stylesheet" href="css/animations.css?v=2026-05-21g" />

  <!-- Siembra sincrónica del estado del repo en localStorage ANTES de que
       cualquier módulo lea sus claves persistidas. Si el servidor no está
       disponible (modo estático), simplemente caemos al localStorage local. -->
  <script>
    (function () {
      try {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/state', false);
        try { xhr.send(null); } catch (_) { return; }
        if (xhr.status !== 200) return;
        var snap = JSON.parse(xhr.responseText || '{}');
        var data = (snap && snap.data) ? snap.data : snap;
        if (!data || typeof data !== 'object') return;
        Object.keys(data).forEach(function (k) {
          var v = data[k];
          if (v === null || v === undefined) return;
          var s = (typeof v === 'string') ? v : JSON.stringify(v);
          try { localStorage.setItem(k, s); } catch (_) {}
        });
      } catch (_) { /* sin servidor: sin sembrar */ }
    })();
  </script>

  <!-- Scripts (deferred, en orden: typewriter, chapters, panelLoader, scrollManager, audioManager, bubbleEditor, main) -->
  <script defer src="js/typewriter.js?v=2026-05-23c"></script>
  <script defer src="js/chapters/chapter1.js?v=2026-05-23c"></script>
  <script defer src="js/chapters/chapter2.js?v=2026-05-23c"></script>
  <script defer src="js/chapters/chapter3.js?v=2026-05-23c"></script>
  <script defer src="js/chapters/chapter4.js?v=2026-05-23c"></script>
  <script defer src="js/chapters/chapter5.js?v=2026-05-23c"></script>
  <script defer src="js/chapters/chapter6.js?v=2026-05-23c"></script>
  <script defer src="js/chapters/chapter7.js?v=2026-05-23c"></script>
  <script defer src="js/chapters/chapter8.js?v=2026-05-23c"></script>
  <script defer src="js/chapters/chapter9.js?v=2026-05-23c"></script>
  <script defer src="js/panelLoader.js?v=2026-05-23c"></script>
  <script defer src="js/scrollManager.js?v=2026-05-23c"></script>
  <script defer src="js/audioManager.js?v=2026-05-23c"></script>
  <script defer src="js/storyState.js?v=2026-05-23c"></script>
  <script defer src="js/repoSync.js?v=2026-05-23c"></script>
  <script defer src="js/bubbleEditor.js?v=2026-05-23c"></script>
  <script defer src="js/main.js?v=2026-05-23c"></script>
</head>
<body>
  <div id="app">
    <!-- Canvas de partículas inmersivas (luciérnagas/estrellas) -->
    <canvas id="immersion-canvas" aria-hidden="true"></canvas>

    <!-- Preloader -->
    <div id="preloader" class="preloader" aria-hidden="false" role="status" aria-live="polite">
      <div class="preloader__inner">
        <div class="preloader__star" aria-hidden="true">
          <svg viewBox="0 0 64 64" width="80" height="80" focusable="false">
            <path
              d="M32 4l7 18 19 2-14 13 4 19-16-10-16 10 4-19L6 24l19-2z"
              fill="currentColor"
            />
          </svg>
        </div>
        <p class="preloader__text">
          <span class="preloader__text-label">Preparando el bosque</span><span class="preloader__dots" aria-hidden="true"><span>.</span><span>.</span><span>.</span></span>
        </p>
      </div>
    </div>

    <!-- Header -->
    <header class="site-header" role="banner">
      <div class="site-header__inner">
        <h1 class="site-header__title">Los Hilos del Agua y el Plato de las Preguntas</h1>
        <p class="site-header__subtitle">Un cuento ilustrado para los pequeños soñadores</p>
      </div>

      <!-- Indicador de capítulo -->
      <div
        id="chapter-indicator"
        class="chapter-indicator"
        aria-live="polite"
        aria-label="Capítulo actual"
      >
        <span class="chapter-indicator__label">Capítulo</span>
        <span id="chapter-indicator-number" class="chapter-indicator__number">1</span>
        <span class="chapter-indicator__divider">/</span>
        <span id="chapter-indicator-total" class="chapter-indicator__total">9</span>
      </div>

      <!-- Botón de mute -->
      <button
        id="mute-toggle"
        class="mute-toggle"
        type="button"
        aria-pressed="false"
        aria-label="Silenciar audio del cuento"
        title="Silenciar audio"
      >
        <svg class="mute-toggle__icon mute-toggle__icon--on" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path
            d="M4 9v6h4l5 4V5L8 9H4zm12.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4zM14 3.2v2.1a7 7 0 0 1 0 13.4v2.1a9 9 0 0 0 0-17.6z"
            fill="currentColor"
          />
        </svg>
        <svg class="mute-toggle__icon mute-toggle__icon--off" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path
            d="M4 9v6h4l5 4V5L8 9H4zm15.7 1.3-1.4-1.4L16 11.2l-2.3-2.3-1.4 1.4L14.6 12.6l-2.3 2.3 1.4 1.4 2.3-2.3 2.3 2.3 1.4-1.4-2.3-2.3 2.3-2.3z"
            fill="currentColor"
          />
        </svg>
      </button>
    </header>

    <!-- Contenedor principal de la historia -->
    <main id="story-container" class="story-container" role="main" aria-label="Cuento interactivo">
      <!-- Los capítulos y paneles se inyectarán desde JS (panelLoader.js) -->
    </main>

    <!-- Editor de burbujas: el botón flotante #editor-toggle y el panel lateral
         se crean dinámicamente desde js/bubbleEditor.js para evitar duplicación. -->

    <!-- Footer -->
    <footer class="site-footer" role="contentinfo">
      <p class="site-footer__credits">
        Materia: <strong>Narrativas Visuales</strong>
      </p>
      <p class="site-footer__hint">Un cuento ilustrado interactivo</p>
    </footer>
  </div>
</body>
</html>
